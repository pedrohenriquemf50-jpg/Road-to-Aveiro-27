<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Aveiro '27 - Treinador Pessoal</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          spacing: {
            'safe': 'env(safe-area-inset-bottom, 20px)',
          }
        }
      }
    }
  </script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0?deps=react@18.2.0"
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Esconder scrollbars para assemelhar a app nativa */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    body { 
      -webkit-tap-highlight-color: transparent; 
      background-color: #0f172a; /* bg-slate-900 */
    }
    
    /* Animação suave de entrada */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
  </style>
</head>
<body>
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Activity, Calendar as CalendarIcon, TrendingDown, Target, Bike, Heart, 
      Clock, User, Plus, Map, ChevronRight, ChevronLeft, List, BarChart2,
      Droplets, Flame, Info, X, MapPin, Zap, Settings
    } from 'lucide-react';

    // --- UTILS ---
    const getLocalYMD = (dateObj) => {
      return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
    };

    // --- MOCK DATA FIXO ---
    const INITIAL_PROFILE = {
      age: 24,
      startWeight: 105,
      currentWeight: 105,
      targetWeight: 90,
      height: 180,
      targetBpm: 145,
      targetMonthlyDistance: 50,
      waterGoal: 3000,
      workoutsPerWeek: 4
    };

    const INITIAL_LOGS = [
      {
        id: '0', date: '2026-04-20', type: 'Bicicleta', duration: 29.6, distance: 12.11, bpm: 145, resistance: 12, caloriesBurned: 375, caloriesIn: 0, water: 0, notes: 'Primeiro treino após 3 meses. Pernas a tremer.'
      },
      {
        id: '1', date: '2026-04-21', type: 'Bicicleta', duration: 30.16, distance: 12.36, bpm: 150, resistance: 12, caloriesBurned: 412, caloriesIn: 150, water: 600, notes: 'Jejum, 2 bolachas e café. Transpirei bué.'
      },
      {
        id: '2', date: '2026-04-27', type: 'Bicicleta', duration: 30.88, distance: 12.72, bpm: 175, resistance: 10, caloriesBurned: 520, caloriesIn: 0, water: 0, notes: 'Dificuldade na respiração. Puxei pra crlh.'
      }
    ];

    const BASE_DATE = new Date('2026-04-28'); 
    const TARGET_DATE = new Date('2027-04-25');
    const TARGET_DISTANCE = 21.1;

    function App() {
      const [activeTab, setActiveTab] = useState('dashboard');
      const [profile, setProfile] = useState(INITIAL_PROFILE);
      const [logs, setLogs] = useState(INITIAL_LOGS);

      const bmr = useMemo(() => Math.round((10 * profile.currentWeight) + (6.25 * profile.height) - (5 * profile.age) + 5), [profile]);

      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 font-sans pb-20 selection:bg-blue-500/30">
          {/* HEADER */}
          <header className="bg-slate-800/80 backdrop-blur-md border-b border-slate-700 p-4 sticky top-0 z-30 shadow-md">
            <div className="max-w-md mx-auto flex items-center justify-between">
              <div>
                <h1 className="text-xl font-black bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent flex items-center gap-2">
                  <Activity size={22} className="text-blue-400" /> Aveiro '27
                </h1>
              </div>
              <div className="flex flex-col items-end">
                <span className="text-sm font-bold text-slate-300 bg-slate-900 px-3 py-1 rounded-lg border border-slate-700 shadow-inner flex items-center gap-1.5">
                  Faltam <span className="text-emerald-400 font-black">{Math.ceil((TARGET_DATE - BASE_DATE) / (1000 * 60 * 60 * 24))}</span> dias
                </span>
              </div>
            </div>
          </header>

          {/* MAIN CONTENT */}
          <main className="max-w-md mx-auto p-4 space-y-6 relative">
            {activeTab === 'dashboard' && <Dashboard profile={profile} logs={logs} bmr={bmr} setActiveTab={setActiveTab} />}
            {activeTab === 'plan' && <CoachPlan profile={profile} logs={logs} setProfile={setProfile} />}
            {activeTab === 'log' && <LogEntry logs={logs} setLogs={setLogs} setActiveTab={setActiveTab} />}
            {activeTab === 'history' && <History logs={logs} profile={profile} />}
            {activeTab === 'profile' && <Profile profile={profile} setProfile={setProfile} bmr={bmr} />}
          </main>

          {/* BOTTOM NAVIGATION */}
          <nav className="fixed bottom-0 w-full bg-slate-800/95 backdrop-blur-md border-t border-slate-700 pb-safe z-40">
            <div className="max-w-md mx-auto flex justify-around p-2">
              <NavItem icon={<Activity />} label="Resumo" isActive={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
              <NavItem icon={<Target />} label="Treinador" isActive={activeTab === 'plan'} onClick={() => setActiveTab('plan')} />
              <NavItem icon={<Plus />} label="Registar" isActive={activeTab === 'log'} onClick={() => setActiveTab('log')} />
              <NavItem icon={<CalendarIcon />} label="Histórico" isActive={activeTab === 'history'} onClick={() => setActiveTab('history')} />
              <NavItem icon={<User />} label="Perfil" isActive={activeTab === 'profile'} onClick={() => setActiveTab('profile')} />
            </div>
          </nav>
        </div>
      );
    }

    // --- TAB: DASHBOARD ---
    function Dashboard({ profile, logs, bmr, setActiveTab }) {
      const [filterType, setFilterType] = useState('Todos');

      const workouts = useMemo(() => logs.filter(l => l.type), [logs]);
      const filteredWorkouts = useMemo(() => filterType === 'Todos' ? workouts : workouts.filter(l => l.type === filterType), [workouts, filterType]);

      const stats = useMemo(() => {
        const totalDist = filteredWorkouts.reduce((acc, l) => acc + parseFloat(l.distance || 0), 0);
        const totalTime = filteredWorkouts.reduce((acc, l) => acc + parseFloat(l.duration || 0), 0);
        const maxDist = filteredWorkouts.length ? Math.max(...filteredWorkouts.map(l => parseFloat(l.distance || 0))) : 0;
        
        const logsWithBpm = filteredWorkouts.filter(l => l.bpm > 0);
        const avgBpm = logsWithBpm.length ? Math.round(logsWithBpm.reduce((acc, l) => acc + parseInt(l.bpm), 0) / logsWithBpm.length) : 0;
        const avgPace = totalDist > 0 ? totalTime / totalDist : 0;

        return { totalDist, totalTime, maxDist, avgBpm, avgPace, count: filteredWorkouts.length };
      }, [filteredWorkouts]);

      const todayLog = logs.sort((a, b) => new Date(b.date) - new Date(a.date))[0] || {};
      const tdee = Math.round((bmr * 1.2) + (todayLog.caloriesBurned || 0));
      const caloricDeficit = tdee - (todayLog.caloriesIn || 0);

      const distanceProgress = Math.min(100, (stats.maxDist / TARGET_DISTANCE) * 100);
      const weightProgress = profile.startWeight === profile.targetWeight ? 100 : 
        Math.max(0, Math.min(100, ((profile.startWeight - profile.currentWeight) / (profile.startWeight - profile.targetWeight)) * 100));

      return (
        <div className="space-y-6 animate-fade-in">
          <section className="bg-slate-800 rounded-2xl p-5 border border-slate-700 shadow-xl">
            <h2 className="text-sm font-black mb-6 text-slate-300 uppercase tracking-widest border-b border-slate-700 pb-2">Progresso Global</h2>
            <div className="mb-6">
              <div className="flex justify-between items-end mb-2">
                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1"><Map size={14}/> Distância Máxima</span>
                <div className="text-right">
                  <span className="font-black text-xl text-white">{stats.maxDist.toFixed(2)}</span>
                  <span className="text-xs text-slate-400 font-bold ml-1">/ 21.1 km</span>
                </div>
              </div>
              <div className="h-4 w-full bg-slate-900/80 rounded-full overflow-hidden border border-slate-700/50 shadow-inner">
                <div className="h-full bg-gradient-to-r from-blue-600 via-blue-400 to-cyan-400 rounded-full transition-all duration-1000" style={{ width: `${distanceProgress}%` }} />
              </div>
            </div>
            <div>
              <div className="flex justify-between items-end mb-2">
                <span className="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1"><TrendingDown size={14}/> Meta de Peso</span>
                <div className="text-right">
                  <span className="font-black text-xl text-white">{profile.currentWeight}</span>
                  <span className="text-xs text-slate-400 font-bold ml-1">/ {profile.targetWeight} kg</span>
                </div>
              </div>
              <div className="h-4 w-full bg-slate-900/80 rounded-full overflow-hidden border border-slate-700/50 shadow-inner">
                <div className="h-full bg-gradient-to-r from-emerald-600 via-emerald-400 to-green-400 rounded-full transition-all duration-1000" style={{ width: `${weightProgress}%` }} />
              </div>
            </div>
          </section>

          <div className="grid grid-cols-2 gap-4">
            <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl p-4 border border-slate-700 shadow-lg flex flex-col justify-between">
              <div className="flex items-center gap-1 text-[10px] text-slate-400 font-bold mb-2 uppercase"><Flame size={12} className="text-orange-400"/> Défice Hoje</div>
              <div className="mb-2">
                <div className="text-2xl font-black text-white">{caloricDeficit > 0 ? `-${caloricDeficit}` : `+${Math.abs(caloricDeficit)}`} <span className="text-[10px] text-slate-500 uppercase">kcal</span></div>
              </div>
              <div className={`text-[10px] font-bold px-2 py-1.5 rounded-lg text-center ${caloricDeficit > 0 ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/30' : 'bg-red-500/20 text-red-400 border border-red-500/30'}`}>
                {caloricDeficit > 0 ? 'Queima Saudável 🔥' : 'Excesso Calórico ⚠️'}
              </div>
            </div>

            <div onClick={() => setActiveTab('plan')} className="bg-gradient-to-br from-blue-900/50 to-slate-900 rounded-2xl p-4 border border-blue-500/40 shadow-[0_0_15px_rgba(59,130,246,0.15)] flex flex-col justify-between cursor-pointer hover:border-blue-400 transition-all group">
               <div className="flex items-center gap-1 text-[10px] text-blue-300 font-bold mb-1 uppercase tracking-widest"><Target size={12} className="text-blue-400"/> Treinador Virtual</div>
               <p className="text-xs text-slate-300 font-medium leading-tight">O teu plano completo para esta semana.</p>
               <div className="mt-auto flex items-center justify-between bg-blue-600 text-white px-3 py-1.5 rounded-lg font-bold text-xs shadow-md group-hover:bg-blue-500 transition-colors">
                 Ver Treinos <ChevronRight size={14} />
               </div>
            </div>
          </div>

          <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
            {['Todos', 'Bicicleta', 'Corrida', 'Caminhada'].map(type => (
              <button key={type} onClick={() => setFilterType(type)} className={`whitespace-nowrap px-5 py-2 rounded-full text-xs font-black transition-all ${filterType === type ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/50 scale-105' : 'bg-slate-800 text-slate-400 border border-slate-700 hover:text-slate-200'}`}>
                {type}
              </button>
            ))}
          </div>

          <div>
            <h3 className="text-sm font-bold text-slate-400 mb-3 uppercase tracking-wider px-1">Análise ({filterType})</h3>
            <div className="grid grid-cols-2 gap-3">
              <KpiCard icon={<Heart className={stats.avgBpm > profile.targetBpm ? "text-red-400" : "text-emerald-400"} />} label="BPM Médio" value={stats.avgBpm || '-'} unit="bpm" alert={stats.avgBpm > profile.targetBpm} insight={stats.avgBpm > profile.targetBpm ? `BPM (${stats.avgBpm}) alto! Foca-te em abrandar para a Zona 2 (abaixo de ${profile.targetBpm}) para ganhar resistência pura.` : `Excelente. O teu motor está na Zona de queima de gordura (≤${profile.targetBpm} BPM).`} />
              <KpiCard icon={<Map className="text-blue-400" />} label="Dist. Máxima" value={stats.maxDist.toFixed(1)} unit="km" insight={`Faltam ${(TARGET_DISTANCE - stats.maxDist).toFixed(1)}km. A regra de ouro é: não aumentes o teu treino longo em mais de 10% por semana.`} />
              <KpiCard icon={<Activity className="text-yellow-400" />} label="Ritmo Médio" value={formatPace(stats.avgPace)} unit="/km" insight={`Projeção: Neste ritmo constante, terminarias os 21km em aprox. ${formatPace(stats.avgPace * TARGET_DISTANCE)}h. Mantém o foco no tempo nas pernas.`} />
              <KpiCard icon={<Clock className="text-purple-400" />} label="Tempo Total" value={Math.floor(stats.totalTime)} unit="min" insight={`Acumulaste ${Math.floor(stats.totalTime)} minutos de esforço. O volume semanal contínuo é a fundação de qualquer prova de resistência.`} />
            </div>
          </div>
        </div>
      );
    }

    // --- TAB: PLANO ---
    function CoachPlan({ profile, logs, setProfile }) {
      const maxDist = Math.max(...logs.filter(l => l.type).map(l => parseFloat(l.distance || 0)), 5); 
      const longDist = parseFloat((maxDist * 1.05).toFixed(1));
      const longTime = Math.round((longDist / 24) * 60);
      const baseDist = parseFloat((maxDist * 0.65).toFixed(1));
      const baseTime = Math.round((baseDist / 24) * 60);
      const recoveryTime = 25;

      return (
        <div className="space-y-6 animate-fade-in pb-10">
          <div className="bg-slate-800 p-5 rounded-2xl border border-slate-700 shadow-xl relative overflow-hidden">
            <div className="absolute right-0 top-0 opacity-10 translate-x-4 -translate-y-4"><Activity size={120} className="text-blue-400" /></div>
            <h2 className="text-xl font-black text-white flex items-center gap-2 mb-2 relative z-10"><Target className="text-blue-400"/> Treinador Virtual</h2>
            <p className="text-xs text-slate-300 leading-relaxed font-medium relative z-10">
              Esta é a tua folha de treino para esta semana baseada no teu último pico de performance (<strong>{maxDist.toFixed(2)} km</strong>). Como o teu objetivo final requer corrida de longo impacto, nesta fase estamos focados em proteger os joelhos usando a tua NordicTrack, melhorando apenas o teu sistema cardiovascular.
            </p>
          </div>

          <div className="flex justify-between items-center px-2">
            <h3 className="font-black text-slate-300 uppercase tracking-widest text-sm">O Teu Plano</h3>
            <select className="bg-slate-800 border border-slate-600 rounded-lg p-1.5 text-xs font-bold text-white focus:outline-none shadow-sm" value={profile.workoutsPerWeek} onChange={(e) => setProfile({...profile, workoutsPerWeek: parseInt(e.target.value)})}>
              <option value={3}>3 Dias por Semana</option>
              <option value={4}>4 Dias por Semana</option>
              <option value={5}>5 Dias por Semana</option>
            </select>
          </div>

          <div className="space-y-4">
            <WorkoutDetailCard title="Treino 1: Base Aeróbica" color="emerald" equipment="NordicTrack VXR 400 (Bicicleta)" distance={`${baseDist} km`} time={`~${baseTime} min`} targetBpm={`< ${profile.targetBpm} BPM`} resistance="Nível 8" speed="~24 km/h" notes="Treino para ensinar o corpo a queimar gordura. O ritmo tem de ser confortável. Se ofegares, estás a ir depressa demais." />
            {profile.workoutsPerWeek >= 4 && (
              <WorkoutDetailCard title="Treino 2: Limiar de Esforço" color="orange" equipment="NordicTrack VXR 400 (Bicicleta)" distance={`${baseDist + 1} km`} time={`~${baseTime + 2} min`} targetBpm={`150 - 165 BPM`} resistance="Nível 10 ou 11" speed="~25 km/h" notes="Este é o dia de suar como fizeste no nível 12 e 10. Mantém a resistência alta e as RPM acima das 75." />
            )}
            {profile.workoutsPerWeek >= 5 && (
              <WorkoutDetailCard title="Treino 3: Recuperação Ativa" color="yellow" equipment="NordicTrack VXR 400 (Caminhada ou Bike)" distance="Não importa" time={`${recoveryTime} min`} targetBpm="100 - 120 BPM" resistance="Nível 2 a 4" speed="Ritmo de passeio" notes="Objetivo: Limpar o ácido lático das pernas. Pedalada super fluída sem sentir força nos músculos." />
            )}
            <WorkoutDetailCard title="Treino Longo (O Teste da Semana)" color="blue" equipment="NordicTrack VXR 400 (Bicicleta)" distance={`${longDist} km`} time={`~${longTime} min`} targetBpm={`135 - 145 BPM`} resistance="Nível 6 a 8" speed="~22 km/h" notes="Este é o treino que constrói a Meia Maratona. Ignora a resistência e a velocidade. O TEU ÚNICO OBJETIVO é fazer a distância sem parar. Mantém a resistência baixa se a respiração apertar." />
          </div>
        </div>
      );
    }

    function WorkoutDetailCard({ title, color, equipment, distance, time, targetBpm, resistance, speed, notes }) {
      const colorStyles = {
        emerald: 'border-emerald-500 from-emerald-900/30', orange: 'border-orange-500 from-orange-900/30',
        yellow: 'border-yellow-500 from-yellow-900/30', blue: 'border-blue-500 from-blue-900/30',
      };
      const textStyles = { emerald: 'text-emerald-400', orange: 'text-orange-400', yellow: 'text-yellow-400', blue: 'text-blue-400' };

      return (
        <div className={`bg-gradient-to-br to-slate-900 rounded-2xl p-4 border-l-4 border-y border-r border-slate-700 shadow-md ${colorStyles[color]}`}>
          <h4 className="font-black text-white text-base mb-3">{title}</h4>
          <div className="grid grid-cols-2 gap-x-2 gap-y-3 mb-4">
            <div className="bg-slate-900/80 p-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[9px] uppercase font-bold text-slate-500 flex items-center gap-1"><Bike size={10}/> Aparelho</span><span className="text-xs font-bold text-white mt-0.5 leading-tight">{equipment}</span></div>
            <div className="bg-slate-900/80 p-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[9px] uppercase font-bold text-slate-500 flex items-center gap-1"><Map size={10}/> Distância</span><span className={`text-sm font-black mt-0.5 ${textStyles[color]}`}>{distance}</span></div>
            <div className="bg-slate-900/80 p-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[9px] uppercase font-bold text-slate-500 flex items-center gap-1"><Clock size={10}/> Tempo Alvo</span><span className="text-sm font-black text-white mt-0.5">{time}</span></div>
            <div className="bg-slate-900/80 p-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[9px] uppercase font-bold text-slate-500 flex items-center gap-1"><Heart size={10}/> BPM Alvo</span><span className="text-sm font-black text-white mt-0.5">{targetBpm}</span></div>
            <div className="bg-slate-900/80 p-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[9px] uppercase font-bold text-slate-500 flex items-center gap-1"><Settings size={10}/> Resistência</span><span className="text-sm font-black text-white mt-0.5">{resistance}</span></div>
            <div className="bg-slate-900/80 p-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[9px] uppercase font-bold text-slate-500 flex items-center gap-1"><Activity size={10}/> Vel. Média</span><span className="text-sm font-black text-white mt-0.5">{speed}</span></div>
          </div>
          <div className="bg-slate-900/60 p-3 rounded-xl border border-slate-700/50">
            <p className="text-xs text-slate-300 italic font-medium leading-relaxed"><Info size={12} className="inline mr-1 mb-0.5 opacity-70" />{notes}</p>
          </div>
        </div>
      );
    }

    // --- TAB: REGISTO ---
    function LogEntry({ logs, setLogs, setActiveTab }) {
      const [logType, setLogType] = useState('workout');
      const [formData, setFormData] = useState({ date: getLocalYMD(new Date()), type: 'Bicicleta', duration: '', distance: '', bpm: '', resistance: '', notes: '', caloriesIn: '', caloriesBurned: '', water: '' });

      const handleSubmit = (e) => {
        e.preventDefault();
        const newLog = {
          id: Date.now().toString(), date: formData.date, type: logType === 'workout' ? formData.type : null,
          duration: parseFloat(formData.duration) || 0, distance: parseFloat(formData.distance) || 0, bpm: parseInt(formData.bpm) || 0, resistance: parseInt(formData.resistance) || 0,
          caloriesBurned: parseInt(formData.caloriesBurned) || 0, caloriesIn: parseInt(formData.caloriesIn) || 0, water: parseInt(formData.water) || 0, notes: formData.notes
        };
        
        const existingLogIndex = logs.findIndex(l => l.date === formData.date && !l.type);
        let updatedLogs = [...logs];
        if (logType === 'nutrition' && existingLogIndex >= 0) {
           updatedLogs[existingLogIndex].water += newLog.water;
           updatedLogs[existingLogIndex].caloriesIn += newLog.caloriesIn;
        } else {
           updatedLogs.push(newLog);
        }
        updatedLogs.sort((a, b) => new Date(b.date) - new Date(a.date));
        setLogs(updatedLogs);
        setActiveTab('history');
      };

      return (
        <div className="bg-slate-800 rounded-2xl p-5 border border-slate-700 animate-fade-in shadow-xl">
          <div className="flex bg-slate-900 rounded-xl p-1.5 mb-6 border border-slate-700 shadow-inner">
            <button onClick={() => setLogType('workout')} className={`flex-1 py-2.5 text-sm font-black rounded-lg transition-all ${logType === 'workout' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>🏋️ Treino</button>
            <button onClick={() => setLogType('nutrition')} className={`flex-1 py-2.5 text-sm font-black rounded-lg transition-all ${logType === 'nutrition' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'}`}>🍏 Nutrição</button>
          </div>
          <form onSubmit={handleSubmit} className="space-y-4">
            <Input label="Data do Registo" type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} required />
            {logType === 'workout' && (
              <>
                <div className="flex flex-col">
                  <label className="text-xs text-slate-400 mb-1 font-bold uppercase tracking-wider">Modalidade</label>
                  <select className="bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-semibold focus:border-blue-500 focus:outline-none" value={formData.type} onChange={e => setFormData({...formData, type: e.target.value})}>
                    <option>Bicicleta</option><option>Corrida</option><option>Caminhada</option>
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <Input label="Tempo (min)" type="number" step="0.1" value={formData.duration} onChange={e => setFormData({...formData, duration: e.target.value})} required />
                  <Input label="Distância (km)" type="number" step="0.01" value={formData.distance} onChange={e => setFormData({...formData, distance: e.target.value})} required />
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <Input label="BPM Médio" type="number" value={formData.bpm} onChange={e => setFormData({...formData, bpm: e.target.value})} />
                  <Input label="Nível/Resistência" type="number" value={formData.resistance} onChange={e => setFormData({...formData, resistance: e.target.value})} />
                </div>
                <Input label="Calorias Queimadas (Opcional)" type="number" value={formData.caloriesBurned} onChange={e => setFormData({...formData, caloriesBurned: e.target.value})} />
              </>
            )}
            {logType === 'nutrition' && (
              <div className="space-y-4 bg-slate-900/50 p-4 rounded-xl border border-slate-700 shadow-inner">
                <Input label="Calorias Ingeridas (Total)" type="number" placeholder="Ex: 2100" value={formData.caloriesIn} onChange={e => setFormData({...formData, caloriesIn: e.target.value})} />
                <div className="flex flex-col">
                  <label className="text-xs text-slate-400 mb-1 font-bold uppercase tracking-wider">Água Bebida (ml)</label>
                  <div className="flex gap-2">
                    <input type="number" className="bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-semibold flex-1 focus:border-emerald-500 focus:outline-none" placeholder="Ex: 500" value={formData.water} onChange={e => setFormData({...formData, water: e.target.value})} />
                    <button type="button" onClick={() => setFormData({...formData, water: (parseInt(formData.water) || 0) + 250})} className="bg-blue-600/20 text-blue-400 border border-blue-500/50 px-4 rounded-xl text-xs font-black whitespace-nowrap hover:bg-blue-600 hover:text-white transition-colors shadow-sm">+ 1 Copo</button>
                  </div>
                </div>
              </div>
            )}
            <div className="flex flex-col">
              <label className="text-xs text-slate-400 mb-1 font-bold uppercase tracking-wider">Notas / Sensações</label>
              <textarea className="bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white focus:border-blue-500 focus:outline-none resize-none h-24" placeholder="Como te sentiste hoje?" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} />
            </div>
            <button type="submit" className={`w-full font-black text-lg py-4 px-4 rounded-xl transition-all shadow-lg mt-4 ${logType === 'workout' ? 'bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 shadow-blue-900/30' : 'bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 shadow-emerald-900/30'} text-white`}>
              Guardar Registo
            </button>
          </form>
        </div>
      );
    }

    // --- TAB: HISTÓRICO ---
    function History({ logs, profile }) {
      const [viewMode, setViewMode] = useState('calendar');
      const [timeFrame, setTimeFrame] = useState('month'); 
      const [refDate, setRefDate] = useState(new Date(BASE_DATE));
      const [selectedDate, setSelectedDate] = useState(null);
      const monthNames = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
      const workoutsOnly = logs.filter(l => l.type);

      const period = useMemo(() => {
        const year = refDate.getFullYear();
        const month = refDate.getMonth();
        let startMonth, endMonth, title;
        if (timeFrame === 'month') { startMonth = month; endMonth = month; title = `${monthNames[month]} ${year}`; }
        else if (timeFrame === 'quarter') { const q = Math.floor(month / 3); startMonth = q * 3; endMonth = startMonth + 2; title = `${q + 1}º Tri ${year}`; }
        else if (timeFrame === 'semester') { const s = Math.floor(month / 6); startMonth = s * 6; endMonth = startMonth + 5; title = `${s + 1}º Semestre ${year}`; }
        else { startMonth = 0; endMonth = 11; title = `Ano ${year}`; }
        return { startMonth, endMonth, year, title };
      }, [refDate, timeFrame]);

      const changePeriod = (dir) => {
        const d = new Date(refDate);
        const amount = dir === 'next' ? 1 : -1;
        if (timeFrame === 'month') d.setMonth(d.getMonth() + amount);
        if (timeFrame === 'quarter') d.setMonth(d.getMonth() + (3 * amount));
        if (timeFrame === 'semester') d.setMonth(d.getMonth() + (6 * amount));
        if (timeFrame === 'year') d.setFullYear(d.getFullYear() + amount);
        setRefDate(d);
      };

      const chartData = useMemo(() => {
        if (timeFrame === 'month') return null; 
        const data = [];
        for (let m = period.startMonth; m <= period.endMonth; m++) {
          const targetMonthString = `${period.year}-${String(m + 1).padStart(2, '0')}`;
          const monthDistance = workoutsOnly.filter(w => w.date.startsWith(targetMonthString)).reduce((sum, w) => sum + parseFloat(w.distance || 0), 0);
          data.push({ label: monthNames[m], distance: monthDistance });
        }
        return data;
      }, [workoutsOnly, timeFrame, period]);

      const renderHeatmap = () => {
        const monthsToRender = Array.from({ length: period.endMonth - period.startMonth + 1 }, (_, i) => period.startMonth + i);
        const isCompact = timeFrame !== 'month';
        const activeDates = new Set(logs.map(w => w.date));
        const trainedDates = new Set(workoutsOnly.map(w => w.date));

        return (
          <div className={`grid gap-3 mt-4 ${timeFrame === 'year' ? 'grid-cols-3' : timeFrame === 'semester' ? 'grid-cols-2' : timeFrame === 'quarter' ? 'grid-cols-3' : 'grid-cols-1'}`}>
            {monthsToRender.map(month => {
              const daysInMonth = new Date(period.year, month + 1, 0).getDate();
              const firstDay = new Date(period.year, month, 1).getDay();
              const startOffset = firstDay === 0 ? 6 : firstDay - 1; 
              const blanks = Array.from({ length: startOffset }, (_, i) => i);
              const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);
              return (
                <div key={month} className="bg-slate-800 rounded-xl p-3 border border-slate-700 shadow-sm flex flex-col justify-center">
                  <h3 className={`font-black text-center text-slate-300 uppercase tracking-wider mb-2 ${isCompact ? 'text-[9px]' : 'text-xs'}`}>{monthNames[month]}</h3>
                  {!isCompact && (
                    <div className="grid grid-cols-7 gap-1 text-center mb-1.5">
                      {['S', 'T', 'Q', 'Q', 'S', 'S', 'D'].map((d, i) => <span key={i} className="text-[10px] font-bold text-slate-500">{d}</span>)}
                    </div>
                  )}
                  <div className="grid grid-cols-7 gap-1">
                    {blanks.map(b => <div key={`b-${b}`} className="aspect-square" />)}
                    {days.map(d => {
                      const dateStr = `${period.year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                      const hasLog = activeDates.has(dateStr);
                      const isTrained = trainedDates.has(dateStr);
                      return (
                        <div key={d} onClick={() => setSelectedDate(dateStr)} className={`aspect-square rounded-[3px] flex items-center justify-center font-bold transition-all cursor-pointer hover:border hover:border-slate-300 hover:scale-110 z-10 ${isCompact ? 'text-[0px]' : 'text-[10px]'} ${isTrained ? 'bg-emerald-500 text-white shadow-[0_0_8px_rgba(16,185,129,0.5)]' : hasLog ? 'bg-yellow-500/80 text-white shadow-[0_0_4px_rgba(234,179,8,0.5)]' : 'bg-slate-900/60 text-slate-500'}`}>
                          {!isCompact && d}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        );
      };

      const renderBarChart = () => {
        const maxDistInChart = Math.max(...chartData.map(d => d.distance), 1); 
        const yAxisMax = Math.max(maxDistInChart, profile.targetMonthlyDistance);
        return (
          <div className="bg-slate-800 rounded-xl p-5 border border-slate-700 shadow-lg mt-4 animate-fade-in relative">
            <h3 className="text-xs font-black text-slate-400 mb-8 uppercase tracking-wider">Volume Acumulado (km)</h3>
            <div className="flex items-end justify-between h-40 gap-3 relative">
              <div className="absolute w-full border-t border-dashed border-slate-500/50 flex items-center z-0" style={{ bottom: `${(profile.targetMonthlyDistance / yAxisMax) * 100}%` }}>
                <span className="text-[10px] text-slate-300 bg-slate-800 px-1.5 py-0.5 -mt-4 font-bold rounded">Meta: {profile.targetMonthlyDistance}km</span>
              </div>
              {chartData.map((data, i) => {
                const heightPct = (data.distance / yAxisMax) * 100;
                return (
                  <div key={i} className="flex flex-col items-center flex-1 z-10 h-full justify-end">
                    <div className="text-[10px] font-black text-white mb-1.5 bg-slate-900 px-1.5 py-0.5 rounded border border-slate-700">{data.distance > 0 ? `${data.distance.toFixed(1)}` : '0'}</div>
                    <div className="w-full max-w-[2.5rem] bg-slate-900 rounded-t-md flex items-end overflow-hidden border border-slate-700 shadow-inner h-full">
                      <div className={`w-full transition-all duration-700 ${data.distance > 0 ? 'bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.8)]' : 'bg-transparent'}`} style={{ height: `${data.distance > 0 ? Math.max(heightPct, 2) : 0}%` }} />
                    </div>
                    <span className="text-[10px] font-black uppercase text-slate-400 mt-2">{data.label}</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      };

      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between px-1">
            <h2 className="text-lg font-black text-white">O Teu Registo</h2>
            <div className="flex bg-slate-900 p-1 rounded-xl border border-slate-700 shadow-inner">
              <button onClick={() => setViewMode('list')} className={`px-4 py-1.5 text-xs font-bold rounded-lg transition-colors flex items-center gap-1.5 ${viewMode === 'list' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}><List size={14} /> Lista</button>
              <button onClick={() => setViewMode('calendar')} className={`px-4 py-1.5 text-xs font-bold rounded-lg transition-colors flex items-center gap-1.5 ${viewMode === 'calendar' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-white'}`}><BarChart2 size={14} /> Visuais</button>
            </div>
          </div>
          {viewMode === 'list' ? (
            <div className="space-y-3 mt-4 animate-fade-in">
              {logs.length === 0 ? <div className="text-center text-slate-500 py-10 bg-slate-800 rounded-xl border border-slate-700/50">Nenhum registo efetuado.</div> : logs.sort((a,b) => new Date(b.date) - new Date(a.date)).map(l => <LogCard key={l.id} log={l} />)}
            </div>
          ) : (
            <div className="animate-fade-in pb-10">
              <div className="bg-slate-800 rounded-xl p-3 border border-slate-700 shadow-sm mb-4">
                <div className="flex bg-slate-900 rounded-lg p-1 mb-3">
                  {[{id:'month', l:'Mês'}, {id:'quarter', l:'Tri'}, {id:'semester', l:'Sem'}, {id:'year', l:'Ano'}].map(opt => <button key={opt.id} onClick={() => setTimeFrame(opt.id)} className={`flex-1 py-1.5 text-xs font-black rounded-md transition-colors ${timeFrame === opt.id ? 'bg-slate-700 text-white shadow-sm' : 'text-slate-500 hover:text-slate-300'}`}>{opt.l}</button>)}
                </div>
                <div className="flex justify-between items-center px-2">
                  <button onClick={() => changePeriod('prev')} className="p-1 text-slate-400 hover:text-white bg-slate-700/50 rounded-lg"><ChevronLeft size={20} /></button>
                  <h3 className="text-sm font-black text-white tracking-wider">{period.title}</h3>
                  <button onClick={() => changePeriod('next')} className="p-1 text-slate-400 hover:text-white bg-slate-700/50 rounded-lg"><ChevronRight size={20} /></button>
                </div>
              </div>
              {renderHeatmap()}
              {timeFrame !== 'month' && renderBarChart()}
            </div>
          )}
          {selectedDate && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-slate-800 rounded-2xl w-full max-w-sm max-h-[80vh] overflow-y-auto border border-slate-600 shadow-2xl relative p-5">
                <button onClick={() => setSelectedDate(null)} className="absolute top-4 right-4 bg-slate-700 text-slate-300 hover:text-white p-1.5 rounded-full"><X size={18} /></button>
                <h3 className="text-lg font-black text-white mb-1 uppercase">Registo Diário</h3>
                <p className="text-sm text-blue-400 font-bold mb-5">{new Date(selectedDate).toLocaleDateString('pt-PT', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })}</p>
                {logs.filter(l => l.date === selectedDate).length === 0 ? <div className="text-center bg-slate-900 rounded-xl p-6 border border-slate-700"><p className="text-slate-500 text-sm font-bold">Nenhum registo neste dia.</p></div> : <div className="space-y-3">{logs.filter(l => l.date === selectedDate).map(l => <LogCard key={l.id} log={l} />)}</div>}
              </div>
            </div>
          )}
        </div>
      );
    }

    // --- TAB: PERFIL ---
    function Profile({ profile, setProfile, bmr }) {
      const [formData, setFormData] = useState(profile);
      const [saved, setSaved] = useState(false);

      const save = (e) => {
        e.preventDefault();
        setProfile(formData);
        setSaved(true);
        setTimeout(() => setSaved(false), 3000);
      };

      return (
        <div className="bg-slate-800 rounded-2xl p-5 border border-slate-700 animate-fade-in shadow-xl mb-10">
          <h2 className="text-lg font-black mb-6 flex items-center gap-2"><User className="text-purple-400"/> Genética & Metas</h2>
          <form onSubmit={save} className="space-y-5">
            <div className="bg-slate-900/50 p-4 rounded-xl border border-slate-700 space-y-4 relative overflow-hidden">
              <div className="absolute top-0 right-0 p-3 opacity-5"><Activity size={100} /></div>
              <h3 className="text-sm font-black text-slate-300 border-b border-slate-700 pb-2 relative z-10 uppercase tracking-wider">Físico Atual</h3>
              <div className="grid grid-cols-2 gap-4 relative z-10">
                <Input label="Idade" type="number" value={formData.age} onChange={e => setFormData({...formData, age: Number(e.target.value)})} />
                <Input label="Altura (cm)" type="number" value={formData.height} onChange={e => setFormData({...formData, height: Number(e.target.value)})} />
              </div>
              <div className="grid grid-cols-2 gap-4 relative z-10">
                <Input label="Peso Atual (kg)" type="number" step="0.1" value={formData.currentWeight} onChange={e => setFormData({...formData, currentWeight: Number(e.target.value)})} />
                <Input label="Meta Prova (kg)" type="number" step="0.1" value={formData.targetWeight} onChange={e => setFormData({...formData, targetWeight: Number(e.target.value)})} />
              </div>
              <div className="mt-4 bg-gradient-to-r from-purple-900/40 to-slate-900 border border-purple-500/30 p-4 rounded-xl relative z-10">
                <div className="text-[10px] text-purple-300 font-black mb-1 uppercase tracking-widest">O Teu Metabolismo (BMR)</div>
                <div className="text-2xl font-black text-white">{bmr} <span className="text-xs text-purple-400 font-bold uppercase">kcal / dia</span></div>
                <p className="text-[10px] text-slate-400 mt-2 leading-relaxed">Calorias que o corpo queima em repouso. Para emagrecer sem perder músculo, come abaixo deste valor somado ao que gastas nos treinos.</p>
              </div>
            </div>
            <div className="bg-slate-900/50 p-4 rounded-xl border border-slate-700 space-y-4">
              <h3 className="text-sm font-black text-slate-300 border-b border-slate-700 pb-2 uppercase tracking-wider">Parâmetros Desportivos</h3>
              <div className="grid grid-cols-2 gap-4">
                <Input label="Meta Água (ml)" type="number" value={formData.waterGoal} onChange={e => setFormData({...formData, waterGoal: Number(e.target.value)})} />
                <Input label="BPM Alvo (Zona 2)" type="number" value={formData.targetBpm} onChange={e => setFormData({...formData, targetBpm: Number(e.target.value)})} />
              </div>
            </div>
            <button type="submit" className={`w-full font-black text-lg py-4 px-4 rounded-xl transition-all shadow-lg mt-4 ${saved ? 'bg-emerald-600 shadow-emerald-900/30 text-white' : 'bg-slate-700 hover:bg-slate-600 text-white border border-slate-600'}`}>
              {saved ? '✓ Atualizado com Sucesso' : 'Guardar Perfil'}
            </button>
          </form>
        </div>
      );
    }

    // --- UI HELPERS ---
    function NavItem({ icon, label, isActive, onClick }) {
      return (
        <button onClick={onClick} className={`flex flex-col items-center justify-center w-14 gap-1 transition-all duration-300 ${isActive ? 'text-blue-400 transform -translate-y-1' : 'text-slate-500 hover:text-slate-300'}`}>
          {React.cloneElement(icon, { size: isActive ? 22 : 20, className: isActive ? 'drop-shadow-[0_0_8px_rgba(96,165,250,0.5)]' : '' })}
          <span className="text-[9px] font-black tracking-wide uppercase">{label}</span>
        </button>
      );
    }

    function KpiCard({ icon, label, value, unit, alert, insight }) {
      const [showInsight, setShowInsight] = useState(false);
      return (
        <div className={`relative bg-slate-800 rounded-xl border flex flex-col shadow-sm transition-all duration-300 ${alert ? 'border-red-500/30' : 'border-slate-700'} ${showInsight ? 'col-span-2 row-span-2 bg-slate-800 shadow-xl border-blue-500/50 z-20' : 'h-32 hover:border-slate-600'}`}>
          <div className={`p-4 h-full flex flex-col items-start ${showInsight ? 'hidden' : 'block'}`}>
            <div className="w-full flex justify-between items-start mb-2">
              <div className="bg-slate-900 p-2 rounded-lg shadow-inner">{icon}</div>
              {insight && <button onClick={() => setShowInsight(true)} className="p-1.5 bg-blue-500/10 hover:bg-blue-500/20 rounded-full text-blue-400 transition-colors"><span className="text-[10px] font-black px-1 flex items-center gap-1">Dica ✨</span></button>}
            </div>
            <span className="text-[10px] text-slate-400 mb-0.5 uppercase tracking-wider font-bold">{label}</span>
            <div className="flex items-baseline gap-1 mt-auto">
              <span className="text-2xl font-black text-white">{value}</span>
              {unit && <span className="text-xs text-slate-500 font-bold">{unit}</span>}
            </div>
          </div>
          {showInsight && (
            <div className="p-4 h-full flex flex-col animate-fade-in bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl">
              <div className="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
                <span className="text-xs font-black text-blue-400 flex items-center gap-1 uppercase tracking-wider"><Info size={14}/> Insight do Treinador</span>
                <button onClick={() => setShowInsight(false)} className="text-slate-400 hover:text-white p-1.5 bg-slate-800 rounded-full"><X size={14}/></button>
              </div>
              <p className="text-sm text-slate-300 leading-relaxed font-semibold">{insight}</p>
            </div>
          )}
        </div>
      );
    }

    function Input({ label, ...props }) {
      return (
        <div className="flex flex-col">
          <label className="text-[10px] text-slate-400 mb-1.5 font-bold uppercase tracking-wider">{label}</label>
          <input className="bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white font-semibold focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 transition-all shadow-inner" {...props} />
        </div>
      );
    }

    function LogCard({ log }) {
      const isWorkout = !!log.type;
      return (
        <div className="bg-slate-800 rounded-xl p-4 border border-slate-700 shadow-sm flex flex-col gap-3 relative overflow-hidden group hover:border-slate-600 transition-colors">
          <div className={`absolute top-0 left-0 w-1.5 h-full opacity-80 ${isWorkout ? 'bg-gradient-to-b from-blue-500 to-emerald-500' : 'bg-gradient-to-b from-emerald-500 to-yellow-500'}`}></div>
          <div className="flex justify-between items-center pb-2 border-b border-slate-700/50">
            <div className="flex items-center gap-2 pl-2">
              {isWorkout ? (log.type === 'Bicicleta' ? <Bike size={18} className="text-blue-400" /> : <Activity size={18} className="text-emerald-400" />) : <Droplets size={18} className="text-yellow-400" />}
              <span className="font-black text-sm text-white uppercase tracking-wide">{isWorkout ? log.type : 'Nutrição / Água'}</span>
            </div>
            <span className="text-[10px] font-bold text-slate-400 bg-slate-900 px-2 py-1 rounded-md border border-slate-700/50 uppercase">{new Date(log.date).toLocaleDateString('pt-PT', { weekday: 'short', day: '2-digit', month: 'short' })}</span>
          </div>
          {isWorkout && (
            <div className="grid grid-cols-4 gap-2 text-center pl-2">
              <div className="flex flex-col bg-slate-900/50 rounded-lg p-2 border border-slate-700/30"><span className="text-[8px] uppercase text-slate-500 font-bold mb-0.5">Distância</span><span className="font-black text-sm text-white">{log.distance}k</span></div>
              <div className="flex flex-col bg-slate-900/50 rounded-lg p-2 border border-slate-700/30"><span className="text-[8px] uppercase text-slate-500 font-bold mb-0.5">Tempo</span><span className="font-black text-sm text-white">{log.duration}m</span></div>
              <div className="flex flex-col bg-slate-900/50 rounded-lg p-2 border border-slate-700/30"><span className="text-[8px] uppercase text-slate-500 font-bold mb-0.5">BPM Médio</span><span className={`font-black text-sm ${log.bpm > 145 ? 'text-red-400' : 'text-emerald-400'}`}>{log.bpm || '-'}</span></div>
              <div className="flex flex-col bg-slate-900/50 rounded-lg p-2 border border-slate-700/30"><span className="text-[8px] uppercase text-slate-500 font-bold mb-0.5">Nível</span><span className="font-black text-sm text-white">{log.resistance || '-'}</span></div>
            </div>
          )}
          {(!isWorkout || log.water > 0 || log.caloriesIn > 0) && (
            <div className="flex gap-2 pl-2 mt-1 flex-wrap">
              {log.caloriesIn > 0 && <div className="flex items-center gap-1 text-[10px] font-bold text-slate-300 bg-slate-900 px-2.5 py-1 rounded-md border border-slate-700/50"><Flame size={12} className="text-orange-400"/> +{log.caloriesIn} kcal</div>}
              {log.water > 0 && <div className="flex items-center gap-1 text-[10px] font-bold text-slate-300 bg-slate-900 px-2.5 py-1 rounded-md border border-slate-700/50"><Droplets size={12} className="text-blue-400"/> {log.water} ml</div>}
              {log.caloriesBurned > 0 && <div className="flex items-center gap-1 text-[10px] font-bold text-slate-300 bg-slate-900 px-2.5 py-1 rounded-md border border-slate-700/50"><Activity size={12} className="text-emerald-400"/> -{log.caloriesBurned} kcal</div>}
            </div>
          )}
          {log.notes && <div className="bg-slate-900/80 rounded-lg p-2.5 text-xs text-slate-300 font-medium italic border-l-2 border-slate-600 mt-1 ml-2">"{log.notes}"</div>}
        </div>
      );
    }

    const formatPace = (decimalPace) => {
      if (!decimalPace || decimalPace === 0) return '-:--';
      const mins = Math.floor(decimalPace);
      const secs = Math.round((decimalPace - mins) * 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    };

    // Renderizar a App no DOM
    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
